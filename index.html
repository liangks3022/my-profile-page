<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的个人主页</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: "Microsoft YaHei", sans-serif;
      background-color: #f5f5f5;
      color: #333;
      line-height: 1.6;
    }
    .container {
      max-width: 800px;
      margin: 50px auto;
      padding: 0 20px;
    }
    .card {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    h1 {
      font-size: 28px;
      margin-bottom: 10px;
      color: #222;
    }
    .info {
      margin: 10px 0;
      font-size: 16px;
    }
    .section {
      margin-top: 25px;
    }
    .section h2 {
      font-size: 20px;
      margin-bottom: 10px;
      color: #444;
    }
    .skill, .link {
      display: inline-block;
      background: #eef5ff;
      color: #0066cc;
      padding: 5px 12px;
      border-radius: 20px;
      margin: 5px;
    }
    a {
      text-decoration: none;
      color: #0066cc;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">

      </div>

      <div class="section">
        <h2>🔗 联系方式</h2>
        <div class="link"><a href="https://github.com/liangks3022">GitHub</a></div>
        <div class="link"><a href="mailto:3350440749@qq.com">Email</a></div>
